<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Oferta Académica - UTPL</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        header {
            background: #002d55;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }

        .facultad {
            background: white;
            margin: 20px 0;
            padding: 15px;
            border-left: 5px solid #ffcc00;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #002d55;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>

    <header>
        <h1>Oferta Académica Institucional</h1>
    </header>

    <section class="facultad">
        <h2>Facultad de Ingenierías y Arquitectura</h2>
        <table>
            <tr>
                <th>Carrera</th>
                <th>Título que otorga</th>
            </tr>
            <tr>
                <td>Computación</td>
                <td>Ingeniero/a en Tecnologías de la Información</td>
            </tr>
        </table>
    </section>

</body>

</html>
